---
- name: Vérifier le statut du PeopleSoft Application Server
  hosts: all
  gather_facts: false
  vars:
    app_domain: APPDOM
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12

  tasks:
    - name: Vérifier le statut de l'AppServer
      ansible.builtin.raw: |
        export PS_HOME={{ ps_home }}
        export PATH=$PS_HOME/bin:$PATH
        export TUXDIR=$PS_HOME/bin
        export PS_CFG_HOME=/home/psadm2
        cd $PS_HOME
        psadmin -c status -d {{ app_domain }} 2>&1
      register: app_status
      failed_when: false

    - name: Afficher stdout complet
      ansible.builtin.debug:
        msg: "{{ app_status.stdout_lines | default(['(vide)']) }}"

    - name: Afficher stderr
      ansible.builtin.debug:
        msg: "STDERR : {{ app_status.stderr | default('(vide)') }}"

    - name: Afficher RC
      ansible.builtin.debug:
        msg: "RC : {{ app_status.rc | default('?') }}"

    - name: AppServer est UP
      ansible.builtin.debug:
        msg: "✅ AppServer {{ app_domain }} est démarré"
      when: "'Started' in (app_status.stdout | default(''))"

    - name: AppServer est DOWN
      ansible.builtin.debug:
        msg: "❌ AppServer {{ app_domain }} est arrêté ou en erreur"
      when: "'Started' not in (app_status.stdout | default(''))"
