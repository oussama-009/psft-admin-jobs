- name: Statut PeopleSoft Web Server (PIA)
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    pia_domain: peoplesoft
  tasks:

    - name: Récupérer le statut du Web Server
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -w status -d {{ pia_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: web_status
      failed_when: false

    - name: Afficher la sortie brute du statut
      ansible.builtin.debug:
        msg: "{{ web_status.stdout_lines }}"

    - name: Web Server est UP
      ansible.builtin.debug:
        msg: "✅ Web Server {{ pia_domain }} — État : RUNNING"
      when: "'started' in web_status.stdout or 'Started' in web_status.stdout"

    - name: Web Server est DOWN
      ansible.builtin.debug:
        msg: "❌ Web Server {{ pia_domain }} — État : STOPPED"
      when: "'stopped' in web_status.stdout or 'not started' in web_status.stdout"
