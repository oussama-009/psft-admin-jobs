---
- name: Démarrer PeopleSoft Application Server
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    app_domain: APPDOM
    ps_cfg_home: /home/psadm2/psft/pt/8.61
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12
    psadmin_path: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12/bin/psadmin

  tasks:

    - name: Vérifier le statut de l'AppServer
      ansible.builtin.shell: |
        cd "{{ ps_cfg_home }}/appserv/{{ app_domain }}"
        ./psft-appserver-{{ app_domain }}.sh status
      become: true
      become_user: psadm2
      register: app_status
      failed_when: false

    - name: "[DEBUG] Statut initial"
      ansible.builtin.debug:
        msg:
          - "RC     : {{ app_status.rc }}"
          - "STDOUT : {{ app_status.stdout }}"
          - "STDERR : {{ app_status.stderr }}"

    - name: AppServer déjà démarré
      ansible.builtin.debug:
        msg: "AppServer {{ app_domain }} est déjà UP"
      when: "'is Up' in app_status.stdout"

    - block:

        # ─── CORRECTIF : sourcer l'env PS avant psadmin ───────────────────
        - name: Démarrer le domaine AppServer via psadmin
          ansible.builtin.shell: |
            export PS_HOME="{{ ps_home }}"
            export PATH="${PS_HOME}/bin:${PATH}"
            export LD_LIBRARY_PATH="${PS_HOME}/lib:${PS_HOME}/lib64:${LD_LIBRARY_PATH}"
            export TUXDIR="${PS_HOME}"
            export PS_CFG_HOME="{{ ps_cfg_home }}"
            "{{ psadmin_path }}" -c boot -d {{ app_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: app_start
          failed_when: false

        - name: "[DEBUG] Retour commande de démarrage"
          ansible.builtin.debug:
            msg:
              - "RC     : {{ app_start.rc }}"
              - "STDOUT : {{ app_start.stdout }}"
              - "STDERR : {{ app_start.stderr }}"

        - name: Pause de 15 secondes après le démarrage
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que l'AppServer est UP (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            cd "{{ ps_cfg_home }}/appserv/{{ app_domain }}"
            ./psft-appserver-{{ app_domain }}.sh status
          become: true
          become_user: psadm2
          register: app_verify
          until: "'is Up' in app_verify.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: "[DEBUG] Retour vérification"
          ansible.builtin.debug:
            msg:
              - "RC         : {{ app_verify.rc }}"
              - "STDOUT     : {{ app_verify.stdout }}"
              - "STDERR     : {{ app_verify.stderr }}"
              - "Tentatives : {{ app_verify.attempts }}"

        - name: AppServer démarré avec succès
          ansible.builtin.debug:
            msg: "AppServer {{ app_domain }} est maintenant UP"
          when: "'is Up' in app_verify.stdout"

        - name: ALERTE — AppServer n'a pas pu démarrer
          ansible.builtin.fail:
            msg: >
              Impossible de démarrer l'AppServer {{ app_domain }}.
              RC={{ app_start.rc }} | STDOUT={{ app_start.stdout }} | STDERR={{ app_start.stderr }}
          when: "'is Up' not in app_verify.stdout"

      when: "'is Up' not in app_status.stdout"
