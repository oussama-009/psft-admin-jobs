---
- name: Démarrer PeopleSoft Application Server
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    app_domain: APPDOM
    ps_cfg_home: /home/psadm2/psft/pt/8.61
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12
    psadmin_path: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12/bin/psadmin

  tasks:

    - name: Vérifier le statut de l'AppServer
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        export LD_LIBRARY_PATH="{{ ps_home }}/bin:${LD_LIBRARY_PATH}"
        "{{ psadmin_path }}" -c status -d {{ app_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: app_status
      failed_when: false

    - name: AppServer déjà démarré
      ansible.builtin.debug:
        msg: "AppServer {{ app_domain }} est déjà UP — aucune action nécessaire"
      when: "'Started' in app_status.stdout"

    - block:

        - name: Démarrer le domaine AppServer via psadmin
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            export LD_LIBRARY_PATH="{{ ps_home }}/bin:${LD_LIBRARY_PATH}"
            "{{ psadmin_path }}" -c boot -d {{ app_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: app_start
          failed_when: false

        - name: Pause de 15 secondes après le démarrage
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que l'AppServer est UP (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            export LD_LIBRARY_PATH="{{ ps_home }}/bin:${LD_LIBRARY_PATH}"
            "{{ psadmin_path }}" -c status -d {{ app_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: app_verify
          until: "'Started' in app_verify.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: AppServer démarré avec succès
          ansible.builtin.debug:
            msg: "AppServer {{ app_domain }} est maintenant UP"
          when: "'Started' in app_verify.stdout"

        - name: ALERTE — AppServer n'a pas pu démarrer
          ansible.builtin.fail:
            msg: >
              Impossible de démarrer l'AppServer {{ app_domain }}.
              RC={{ app_start.rc }} | STDOUT={{ app_start.stdout }} | STDERR={{ app_start.stderr }}
          when: "'Started' not in app_verify.stdout"

      when: "'Started' not in app_status.stdout"
