---
- name: Diagnostic PeopleSoft
  hosts: all
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12

  tasks:
    - name: Vérifier existence des fichiers clés
      ansible.builtin.shell: |
        echo "=== bash_profile ===" 
        ls -la /home/psadm2/.bash_profile 2>&1 || echo "ABSENT"
        echo "=== psconfig.sh ==="
        ls -la {{ ps_home }}/psconfig.sh 2>&1 || echo "ABSENT"
        echo "=== psadmin ==="
        ls -la {{ ps_home }}/bin/psadmin 2>&1 || echo "ABSENT"
        echo "=== PS_HOME env ==="
        su - psadm2 -s /bin/bash -c "echo PS_HOME=\$PS_HOME"
        echo "=== PATH env ==="
        su - psadm2 -s /bin/bash -c "echo PATH=\$PATH"
        echo "=== psadmin which ==="
        su - psadm2 -s /bin/bash -c "which psadmin 2>&1 || echo NOT FOUND"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: diag

    - name: Afficher diagnostic
      ansible.builtin.debug:
        msg: "{{ diag.stdout_lines }}"
