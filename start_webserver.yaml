- name: Démarrer PeopleSoft Web Server (PIA)
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    pia_domain: peoplesoft
  tasks:

    - name: Vérifier le statut du Web Server
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -w status -d {{ pia_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: web_status
      failed_when: false

    - name: Web Server déjà démarré
      ansible.builtin.debug:
        msg: "⚠️ Web Server {{ pia_domain }} est déjà UP — aucune action nécessaire"
      when: "'PIA is started' in web_status.stdout or 'Started' in web_status.stdout"

    - block:
        - name: Démarrer le Web Server via psadmin
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -w start -d {{ pia_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: web_start
          failed_when: false

        - name: Pause de 15 secondes après le démarrage
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que le Web Server est UP (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -w status -d {{ pia_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: web_verify
          until: "'PIA is started' in web_verify.stdout or 'Started' in web_verify.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: Web Server démarré avec succès
          ansible.builtin.debug:
            msg: "✅ Web Server {{ pia_domain }} est maintenant UP"
          when: "'PIA is started' in web_verify.stdout or 'Started' in web_verify.stdout"

        - name: ALERTE — Web Server n'a pas pu démarrer
          ansible.builtin.fail:
            msg: >
              Impossible de démarrer le Web Server {{ pia_domain }}.
              RC={{ web_start.rc }} | STDOUT={{ web_start.stdout }} | STDERR={{ web_start.stderr }}
          when: "'PIA is started' not in web_verify.stdout and 'Started' not in web_verify.stdout"

      when: "'PIA is stopped' in web_status.stdout or 'not started' in web_status.stdout"
