---
- name: Redémarrer PeopleSoft Application Server
  hosts: all
  gather_facts: false
  vars:
    app_domain: APPDOM
  tasks:

    # ─── PHASE 1 : ARRÊT ───────────────────────────────────────────────────────
    - name: Vérifier le statut de l'AppServer avant arrêt
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -c status -d {{ app_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: app_status
      failed_when: false

    - name: AppServer déjà arrêté — on passe directement au démarrage
      ansible.builtin.debug:
        msg: "⚠️ AppServer {{ app_domain }} est déjà DOWN — passage direct au démarrage"
      when: "'Started' not in app_status.stdout"

    - block:
        - name: Arrêter le domaine AppServer via psadmin
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -c shutdown -d {{ app_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: app_stop
          failed_when: false

        - name: Pause de 15 secondes après l'arrêt
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que l'AppServer est bien arrêté (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -c status -d {{ app_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: app_verify_stop
          until: "'not started' in app_verify_stop.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: AppServer arrêté avec succès
          ansible.builtin.debug:
            msg: "✅ AppServer {{ app_domain }} est maintenant DOWN"
          when: "'not started' in app_verify_stop.stdout"

        - name: ALERTE — AppServer n'a pas pu s'arrêter
          ansible.builtin.fail:
            msg: >
              Impossible d'arrêter l'AppServer {{ app_domain }}.
              RC={{ app_stop.rc }} | STDOUT={{ app_stop.stdout }} | STDERR={{ app_stop.stderr }}
          when: "'not started' not in app_verify_stop.stdout"

      when: "'Started' in app_status.stdout"

    # ─── PHASE 2 : DÉMARRAGE ───────────────────────────────────────────────────
    - name: Démarrer le domaine AppServer via psadmin
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -c boot -d {{ app_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: app_start
      failed_when: false

    - name: Pause de 15 secondes après le démarrage
      ansible.builtin.pause:
        seconds: 15

    - name: Vérifier que l'AppServer est UP (3 tentatives, intervalle 10s)
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -c status -d {{ app_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: app_verify_start
      until: "'Started' in app_verify_start.stdout"
      retries: 3
      delay: 10
      failed_when: false

    - name: AppServer redémarré avec succès
      ansible.builtin.debug:
        msg: "✅ AppServer {{ app_domain }} est maintenant UP — restart terminé"
      when: "'Started' in app_verify_start.stdout"

    - name: ALERTE — AppServer n'a pas pu démarrer
      ansible.builtin.fail:
        msg: >
          Impossible de démarrer l'AppServer {{ app_domain }}.
          RC={{ app_start.rc }} | STDOUT={{ app_start.stdout }} | STDERR={{ app_start.stderr }}
      when: "'Started' not in app_verify_start.stdout"
