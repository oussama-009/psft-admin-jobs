---
- name: Vérifier le statut du PeopleSoft Application Server
  hosts: all
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    app_domain: APPDOM
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12

  tasks:
    - name: Vérifier le statut de l'AppServer
      ansible.builtin.shell: |
        source /home/psadm2/.bash_profile
        source {{ ps_home }}/psconfig.sh
        psadmin -c status -d {{ app_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: app_status
      failed_when: false

    - name: Debug complet (stdout / stderr / rc)
      ansible.builtin.debug:
        msg:
          - "STDOUT : {{ app_status.stdout | default('(vide)') }}"
          - "STDERR : {{ app_status.stderr | default('(vide)') }}"
          - "RC     : {{ app_status.rc | default('(inconnu)') }}"

    - name: AppServer est UP
      ansible.builtin.debug:
        msg: "✅ AppServer {{ app_domain }} est démarré (Started)"
      when: "'Started' in (app_status.stdout | default(''))"

    - name: AppServer est DOWN
      ansible.builtin.debug:
        msg: "❌ AppServer {{ app_domain }} est arrêté ou en erreur"
      when: "'Started' not in (app_status.stdout | default(''))"
