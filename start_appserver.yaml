---
- name: Démarrer PeopleSoft Application Server
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    app_domain: APPDOM
    ps_cfg_home: /home/psadm2/psft/pt/8.61
    psadmin_path: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12/bin/psadmin   # <-- chemin complet de psadmin

  tasks:
    - name: Vérifier le statut de l'AppServer
      ansible.builtin.shell: |
        cd "{{ ps_cfg_home }}/appserv/{{ app_domain }}"
        ./psft-appserver-{{ app_domain }}.sh status
      become: true
      become_user: psadm2
      register: app_status
      failed_when: false

    - name: AppServer déjà démarré
      ansible.builtin.debug:
        msg: "ℹ️ Application Server {{ app_domain }} est déjà UP"
      when: "'is Up' in app_status.stdout"

    - block:
          - name: Démarrer le domaine AppServer via psadmin
            ansible.builtin.shell: |
              "{{ psadmin_path }}" -c boot -d {{ app_domain }}
            become: true
            become_user: psadm2
            register: app_start
            failed_when: false

          - name: Afficher le retour de la commande de démarrage
            ansible.builtin.debug:
              msg:
                - "RC      : {{ app_start.rc }}"
                - "STDOUT  : {{ app_start.stdout }}"
                - "STDERR  : {{ app_start.stderr }}"

        - name: ⏳ Pause de 15 secondes après le démarrage
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que l'AppServer est UP (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            cd "{{ ps_cfg_home }}/appserv/{{ app_domain }}"
            ./psft-appserver-{{ app_domain }}.sh status
          become: true
          become_user: psadm2
          register: app_verify
          until: "'is Up' in app_verify.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: "✅ AppServer démarré avec succès"
          ansible.builtin.debug:
            msg: "✅ Application Server {{ app_domain }} est maintenant UP"
          when: "'is Up' in app_verify.stdout"

        - name: "❌ ALERTE : AppServer n'a pas pu démarrer"
          ansible.builtin.fail:
            msg: "❌ Impossible de démarrer le Application Server {{ app_domain }}"
          when: "'is Up' not in app_verify.stdout"

      when: "'is Up' not in app_status.stdout"
