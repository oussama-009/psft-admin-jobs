- name: Arrêter PeopleSoft Web Server (PIA)
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    pia_domain: peoplesoft
    pia_home: /home/psadm2/psft/pt/8.60
  tasks:

    - name: Vérifier le statut du Web Server
      ansible.builtin.shell: |
        source /home/psadm2/.bashrc
        psadmin -w status -d {{ pia_domain }}
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: web_status
      failed_when: false

    - name: Web Server déjà arrêté
      ansible.builtin.debug:
        msg: "❌ Web Server {{ pia_domain }} est déjà DOWN — aucune action nécessaire"
      when: "'stopped' in web_status.stdout or 'not started' in web_status.stdout"

    - block:
        - name: Arrêter le Web Server via psadmin
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -w shutdown -d {{ pia_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: web_stop
          failed_when: false

        - name: Pause de 15 secondes après l'arrêt
          ansible.builtin.pause:
            seconds: 15

        - name: Vérifier que le Web Server est arrêté (3 tentatives, intervalle 10s)
          ansible.builtin.shell: |
            source /home/psadm2/.bashrc
            psadmin -w status -d {{ pia_domain }}
          args:
            executable: /bin/bash
          become: true
          become_user: psadm2
          register: web_verify
          until: "'stopped' in web_verify.stdout or 'not started' in web_verify.stdout"
          retries: 3
          delay: 10
          failed_when: false

        - name: Web Server arrêté avec succès
          ansible.builtin.debug:
            msg: "✅ Web Server {{ pia_domain }} est maintenant DOWN"
          when: "'stopped' in web_verify.stdout or 'not started' in web_verify.stdout"

        - name: ALERTE — Web Server n'a pas pu s'arrêter
          ansible.builtin.fail:
            msg: >
              Impossible d'arrêter le Web Server {{ pia_domain }}.
              RC={{ web_stop.rc }} | STDOUT={{ web_stop.stdout }} | STDERR={{ web_stop.stderr }}
          when: "'stopped' not in web_verify.stdout and 'not started' not in web_verify.stdout"

      when: "'started' in web_status.stdout or 'Started' in web_status.stdout"
