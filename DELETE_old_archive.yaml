---
- name: Purge Archives Anciennes Plus de 90 Jours
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    archive_path: /home/psadm2/psft/pt/8.61/webserv/peoplesoft/servers/PIA/logs/archive
    jours_retention: 90

  tasks:
    - name: Chercher archives de plus de {{ jours_retention }} jours
      ansible.builtin.find:
        paths: "{{ archive_path }}"
        age: "{{ jours_retention }}d"
        patterns: "*.tar.gz"
        recurse: false
      register: old_archives

    - name: Afficher les archives à supprimer
      ansible.builtin.debug:
        msg: "🗑️ Archives à supprimer : {{ old_archives.files | map(attribute='path') | list }}"

    - name: Supprimer les archives anciennes
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_archives.files }}"
      become: true
      become_user: psadm2

    - name: ✅ Aucune archive à supprimer
      ansible.builtin.debug:
        msg: "✅ Aucune archive de plus de {{ jours_retention }} jours trouvée"
      when: old_archives.matched == 0

    - name: ✅ Purge terminée
      ansible.builtin.debug:
        msg: "✅ {{ old_archives.matched }} archives supprimées avec succès !"
      when: old_archives.matched > 0
