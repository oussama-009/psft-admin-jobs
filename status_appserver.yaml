---
- name: Diagnostic PeopleSoft
  hosts: all
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12

  tasks:
    - name: Vérifier bash_profile
      ansible.builtin.shell: ls -la /home/psadm2/.bash_profile 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: r1
      failed_when: false

    - name: Vérifier psconfig.sh
      ansible.builtin.shell: ls -la {{ ps_home }}/psconfig.sh 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: r2
      failed_when: false

    - name: Vérifier psadmin binaire
      ansible.builtin.shell: ls -la {{ ps_home }}/bin/psadmin 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: r3
      failed_when: false

    - name: Vérifier PS_HOME
      ansible.builtin.shell: echo "PS_HOME=$PS_HOME"
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: r4
      failed_when: false

    - name: Vérifier PATH et psadmin
      ansible.builtin.shell: which psadmin 2>&1 || echo "psadmin NOT FOUND"
      args:
        executable: /bin/bash
      become: true
      become_user: psadm2
      register: r5
      failed_when: false

    - name: Afficher bash_profile
      ansible.builtin.debug:
        msg: "bash_profile : {{ r1.stdout | default('(vide)') }}"

    - name: Afficher psconfig.sh
      ansible.builtin.debug:
        msg: "psconfig.sh  : {{ r2.stdout | default('(vide)') }}"

    - name: Afficher psadmin bin
      ansible.builtin.debug:
        msg: "psadmin bin  : {{ r3.stdout | default('(vide)') }}"

    - name: Afficher PS_HOME
      ansible.builtin.debug:
        msg: "PS_HOME      : {{ r4.stdout | default('(vide)') }}"

    - name: Afficher which psadmin
      ansible.builtin.debug:
        msg: "which psadmin: {{ r5.stdout | default('(vide)') }}"
