---
- name: Diagnostic PeopleSoft
  hosts: all
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.6
    ps_home: /app/PSFT/distribution/FSCM9.2.046/pt/ps_home8.61.12

  tasks:
    - name: Vérifier bash_profile
      ansible.builtin.shell: ls -la /home/psadm2/.bash_profile 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: r1
      failed_when: false

    - name: Afficher bash_profile
      ansible.builtin.debug:
        msg: "bash_profile : {{ r1.stdout | default('(vide)') }} | rc={{ r1.rc | default('?') }}"

    - name: Vérifier psconfig.sh
      ansible.builtin.shell: ls -la {{ ps_home }}/psconfig.sh 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: r2
      failed_when: false

    - name: Afficher psconfig.sh
      ansible.builtin.debug:
        msg: "psconfig.sh : {{ r2.stdout | default('(vide)') }} | rc={{ r2.rc | default('?') }}"

    - name: Vérifier psadmin binaire
      ansible.builtin.shell: ls -la {{ ps_home }}/bin/psadmin 2>&1 || echo "ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: r3
      failed_when: false

    - name: Afficher psadmin bin
      ansible.builtin.debug:
        msg: "psadmin bin : {{ r3.stdout | default('(vide)') }} | rc={{ r3.rc | default('?') }}"

    - name: Chercher psadmin sur tout le système
      ansible.builtin.shell: find /app -name "psadmin" -type f 2>/dev/null || echo "NON TROUVÉ"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: r4
      failed_when: false

    - name: Afficher localisation psadmin
      ansible.builtin.debug:
        msg: "psadmin trouvé : {{ r4.stdout_lines | default(['(vide)']) }}"

    - name: Vérifier utilisateur psadm2
      ansible.builtin.shell: id psadm2 2>&1 || echo "USER ABSENT"
      args:
        executable: /bin/bash
      become: true
      become_user: root
      register: r5
      failed_when: false

    - name: Afficher utilisateur psadm2
      ansible.builtin.debug:
        msg: "psadm2 : {{ r5.stdout | default('(vide)') }}"
