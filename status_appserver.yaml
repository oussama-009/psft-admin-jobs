---
- name: Diagnostic connexion SSH
  hosts: all
  gather_facts: false
  vars:
    ansible_python_interpreter: /usr/bin/python3.6

  tasks:
    - name: Test ping simple
      ansible.builtin.ping:

    - name: Whoami brut
      ansible.builtin.command: whoami
      register: r1
      failed_when: false

    - name: Afficher whoami
      ansible.builtin.debug:
        msg: "whoami : {{ r1.stdout | default('(vide)') }} | rc={{ r1.rc | default('?') }}"

    - name: ID utilisateur
      ansible.builtin.command: id
      register: r2
      failed_when: false

    - name: Afficher id
      ansible.builtin.debug:
        msg: "id : {{ r2.stdout | default('(vide)') }} | rc={{ r2.rc | default('?') }}"

    - name: Quel shell
      ansible.builtin.command: echo $SHELL
      register: r3
      failed_when: false

    - name: Afficher shell
      ansible.builtin.debug:
        msg: "shell : {{ r3.stdout | default('(vide)') }} | rc={{ r3.rc | default('?') }}"

    - name: Lister racine /
      ansible.builtin.command: ls /
      register: r4
      failed_when: false

    - name: Afficher ls /
      ansible.builtin.debug:
        msg: "ls / : {{ r4.stdout_lines | default(['(vide)']) }} | rc={{ r4.rc | default('?') }}"

    - name: Lister /app
      ansible.builtin.command: ls /app
      register: r5
      failed_when: false

    - name: Afficher ls /app
      ansible.builtin.debug:
        msg: "ls /app : {{ r5.stdout_lines | default(['(vide)']) }} | rc={{ r5.rc | default('?') }}"
