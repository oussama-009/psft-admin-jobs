---
- name: Restart PeopleSoft PIA
  hosts: all
  vars:
    ansible_python_interpreter: /usr/bin/python3.6

  tasks:
    - name: 🔴 Etape 1 - Arrêter PeopleSoft
      ansible.builtin.shell: |
        cd /home/psadm2/psft/pt/8.61/webserv/peoplesoft/bin
        ./stopPIA.sh
      become: true
      become_user: psadm2
      register: stop_result

    - name: Afficher résultat Stop
      ansible.builtin.debug:
        msg: "{{ stop_result.stdout }}"

    - name: ⏳ Etape 2 - Attendre 30 secondes
      ansible.builtin.pause:
        seconds: 30

    - name: 🟢 Etape 3 - Démarrer PeopleSoft
      ansible.builtin.shell: |
        cd /home/psadm2/psft/pt/8.61/webserv/peoplesoft/bin
        ./startPIA.sh
      become: true
      become_user: psadm2
      register: start_result

    - name: Afficher résultat Start
      ansible.builtin.debug:
        msg: "{{ start_result.stdout }}"

    - name: ⏳ Etape 4 - Attendre 60 secondes que PeopleSoft démarre
      ansible.builtin.pause:
        seconds: 60

    - name: 🔍 Etape 5 - Vérifier que PeopleSoft est bien UP
      ansible.builtin.shell: |
        cd /home/psadm2/psft/pt/8.61/webserv/peoplesoft/bin
        ./singleserverStatus.sh
      become: true
      become_user: psadm2
      register: status_result
      ignore_errors: true

    - name: ✅ Restart réussi
      ansible.builtin.debug:
        msg: "✅ Restart réussi - PeopleSoft est opérationnel !"
      when: "'Status Check Successful' in status_result.stdout"

    - name: ❌ Restart échoué - ALERTE
      ansible.builtin.fail:
        msg: "❌ ALERTE : PeopleSoft n'a pas redémarré correctement !"
      when: "'Status Check Failed' in status_result.stdout"
